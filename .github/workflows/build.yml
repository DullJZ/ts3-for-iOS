name: Build

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_PATH: TS3iOSApp.xcodeproj
  APP_SCHEME: TS3iOSApp-App
  APP_NAME: TS3iOSApp

jobs:
  swiftpm:
    name: SwiftPM CLI Build
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euxo pipefail

          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

          xcodebuild -version
          swift --version

      - name: Build TS3CLI
        shell: bash
        run: |
          set -euxo pipefail
          swift build --product TS3CLI

  ios-simulator:
    name: iOS Simulator Build (${{ matrix.artifact_suffix }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            artifact_suffix: arm64
            arch: arm64
          - runner: macos-15-intel
            artifact_suffix: intel
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euxo pipefail

          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

          xcodebuild -version

      - name: Build iOS Simulator App
        shell: bash
        run: |
          set -euxo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "build/DerivedData-iOS-${{ matrix.artifact_suffix }}" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=${{ matrix.arch }} \
            build

      - name: Upload iOS Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: TS3iOSApp-ios-simulator-${{ matrix.artifact_suffix }}
          path: build/DerivedData-iOS-${{ matrix.artifact_suffix }}/Build/Products/Debug-iphonesimulator/TS3iOSApp.app
          if-no-files-found: error

  ios-unsigned-ipa:
    name: Unsigned IPA Build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euxo pipefail

          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

          xcodebuild -version

      - name: Build iPhoneOS App
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p build/logs

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData-iOSDevice \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            clean \
            build \
            2>&1 | tee build/logs/ios-device-build.log

      - name: Upload iPhoneOS Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TS3iOSApp-ios-unsigned-ipa-build-log
          path: build/logs/ios-device-build.log
          if-no-files-found: error

      - name: Package Unsigned IPA
        shell: bash
        run: |
          set -euxo pipefail

          APP_PATH="build/DerivedData-iOSDevice/Build/Products/Release-iphoneos/${APP_NAME}.app"
          PAYLOAD_DIR="build/ipa/Payload"
          IPA_PATH="build/${APP_NAME}-unsigned.ipa"

          test -d "$APP_PATH"
          rm -rf build/ipa "$IPA_PATH"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"
          (
            cd build/ipa
            /usr/bin/zip -qry "../${APP_NAME}-unsigned.ipa" Payload
          )
          ls -lh "$IPA_PATH"

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: TS3iOSApp-ios-unsigned-ipa
          path: build/TS3iOSApp-unsigned.ipa
          if-no-files-found: error

  mac-catalyst:
    name: Mac Catalyst Build (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            artifact_suffix: arm64
          - runner: macos-15-intel
            artifact_suffix: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euxo pipefail

          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

          xcodebuild -version

      - name: Build Mac Catalyst App
        shell: bash
        run: |
          set -euxo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            -derivedDataPath "build/DerivedData-Catalyst-${{ matrix.artifact_suffix }}" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload Mac Catalyst App
        uses: actions/upload-artifact@v4
        with:
          name: TS3iOSApp-maccatalyst-${{ matrix.artifact_suffix }}
          path: build/DerivedData-Catalyst-${{ matrix.artifact_suffix }}/Build/Products/Debug-maccatalyst/TS3iOSApp.app
          if-no-files-found: error

  macos-dmg:
    name: macOS DMG Build (${{ matrix.arch_label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            arch_label: arm64
          - runner: macos-15-intel
            arch: x86_64
            arch_label: intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euxo pipefail

          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          else
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi

          xcodebuild -version

      - name: Build Mac Catalyst Release App
        shell: bash
        run: |
          set -euxo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            -derivedDataPath "build/DerivedData-Catalyst-Release-${{ matrix.arch_label }}" \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=${{ matrix.arch }} \
            build

      - name: Package DMG
        shell: bash
        run: |
          set -euxo pipefail

          APP_PATH="build/DerivedData-Catalyst-Release-${{ matrix.arch_label }}/Build/Products/Release-maccatalyst/${APP_NAME}.app"
          STAGING_DIR="build/dmg-root-${{ matrix.arch_label }}"
          DMG_PATH="build/${APP_NAME}-macOS-${{ matrix.arch_label }}.dmg"
          INSTRUCTIONS_PATH="${STAGING_DIR}/Install ${APP_NAME}.txt"

          test -d "$APP_PATH"
          rm -rf "$STAGING_DIR" "$DMG_PATH"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"
          cat > "$INSTRUCTIONS_PATH" <<EOF
          Drag ${APP_NAME}.app to Applications to install.

          Architecture: ${{ matrix.arch_label }}
          This build is unsigned.
          If macOS blocks the first launch, right-click the app and choose Open.
          EOF

          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          hdiutil verify "$DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: TS3iOSApp-macos-dmg-${{ matrix.arch_label }}
          path: build/TS3iOSApp-macOS-${{ matrix.arch_label }}.dmg
          if-no-files-found: error

  release:
    name: Publish Release Assets
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs:
      - ios-unsigned-ipa
      - macos-dmg
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download Unsigned IPA Artifact
        uses: actions/download-artifact@v4
        with:
          name: TS3iOSApp-ios-unsigned-ipa
          path: release-assets

      - name: Download macOS DMG Artifact
        uses: actions/download-artifact@v4
        with:
          pattern: TS3iOSApp-macos-dmg-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/TS3iOSApp-unsigned.ipa
            release-assets/TS3iOSApp-macOS-arm64.dmg
            release-assets/TS3iOSApp-macOS-intel.dmg
