name: TS3iOSApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "14.0"
packages:
  TS3iOS:
    path: .
targets:
  TS3iOSApp:
    type: application
    platform: iOS
    sources:
      - Sources/TS3iOSApp
      - TS3iOSApp/Assets.xcassets
    dependencies:
      - package: TS3iOS
        product: TS3Kit
    info:
      path: TS3iOSApp/Info.plist
      properties:
        CFBundleDisplayName: TS3iOS
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
        NSMicrophoneUsageDescription: Allow microphone access for voice chat.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ts3ios
        PRODUCT_BUNDLE_IDENTIFIER[sdk=macosx*]: com.example.ts3ios.maccatalyst
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_VERSION: 5.9
